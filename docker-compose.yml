services:
  tts:
    build: .
    image: tts-neural:latest
    container_name: tts-app

    # Audio device access
    devices:
      - /dev/snd:/dev/snd

    # File access (mount specific directories)
    volumes:
      - ${HOME}/Documents:/docs:ro
      - ${HOME}/Downloads:/downloads:ro
      - ${HOME}/.cache/tts_app:/root/.cache/tts_app

    stdin_open: true
    tty: true
